name: Publish Retype Docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: retype-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: retype/package-lock.json

      - name: Install Retype dependencies
        run: npm ci
        working-directory: retype

      - name: Build Retype site
        run: npm run docs:build
        working-directory: retype

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: retype/.output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
